# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  docker_image_name: academy
  docker_tag_name: my-custom-tag
  artifact_name: academy-docker-image

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Build Docker image
      run: docker build . --file Dockerfile --tag academy:$(date +%s)



    - name: Hello
      uses: ./.github/actions/maven_build


    - name: Build Docker image with inputs
      uses: ./.github/actions/docker_build
      with:
        image_name: ${{ env.docker_image_name }}
        tag_name: ${{ env.docker_tag_name }}

    - name: Save Docker image to file
      run: docker save -o ${{ env.docker_image_name }}.tar ${{ env.docker_image_name }}:${{ env.docker_tag_name }}

    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.artifact_name }}
        path: ${{ env.docker_image_name }}.tar


  list-images:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.artifact_name }}

      - name: Load Docker image
        run: docker load -i ${{ env.docker_image_name }}.tar

      - name: List Docker images
        run: docker image ls